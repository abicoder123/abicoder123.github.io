<!doctype html><html><head><style type="text/css">body {
	font-family: cursive;
	text-align: center;
  background-color: #FFE6D9;
			
}

.input {
  background: linear-gradient(to right, #F2C2FF, #C2F1FF);
  width: 70px;
  height:40px;
  font-size: 17px;
  font-family: cursive;
}

.add {
  background-color: #C2FFDC;
  font-family: cursive;
  border-radius: 9px;
  padding: 5px;
  font-size: 17px;
}

.x {
  background-color: #C2FFDC;
  font-family: cursive;
  border-radius: 10px;
  padding: 5px;
  font-size: 17px;
}

.minus {
  background-color: #C2FFDC;
  font-family: cursive;
  border-radius: 10px;
  padding: 5px;
  font-size: 17px;
}

.divide {
  background-color: #C2FFDC;
  font-family: cursive;
  border-radius: 10px;
  padding: 5px;
  font-size: 17px;
}

.result{
  font-size: 30px;
  text-shadow: 0 0 15px #D3E3DC;
}


.calculator {
  width: 300px;
  padding: 20px;
  border: 3px solid black;
  border-radius: 15px;
  background-color: #968FFA;
  margin: 50px auto;
  text-align: center;
}

.game {
  width: 300px;
  padding: 20px;
  border: 3px solid black;
  border-radius: 15px;
  background-color: #F863E9;
  margin: 50px auto;
  text-align: center;
}</style></head><body><div class="calculator">
	<h1> Calculator</h1>
	<input id="a" class = "input" type="number">
	<button class = "add" onclick="result.textContent = +a.value + +b.value">
  +
</button>
	<button class = "x" onclick="result.textContent = a.value * b.value">
  x
</button>
	<button class = "divide" onclick="result.textContent = a.value / b.value">
/
</button>
	<button class = "minus" onclick="result.textContent = a.value - b.value">
  -
</button>
	<input id="b" class = "input" type="number">
	<p class="result" id="result"></p>
</div>

</body><html>
